<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message trace</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <header class="header">
    <h1>Cardinal · трассировка сообщений</h1>
    <p class="muted">Введите API-ключ один раз; он хранится только в этом браузере (sessionStorage).</p>
  </header>

  <section class="panel">
    <label for="apiKey">X-Trace-API-Key</label>
    <div class="row">
      <input type="password" id="apiKey" placeholder="Ключ из TRACE_SERVICE_API_KEY" autocomplete="off" />
      <button type="button" id="saveKey">Сохранить ключ</button>
    </div>
    <span id="keyStatus" class="muted"></span>
  </section>

  <section class="panel">
    <label for="searchQ">Поиск</label>
    <div class="row">
      <input type="text" id="searchQ" placeholder="UUID корреляции, chat_id:message_id или пусто — последние" />
      <button type="button" id="btnSearch">Найти</button>
    </div>
    <p class="muted hint">Рекомендация: откройте трейс по UUID из логов или скопируйте correlation_id из деталей.</p>
  </section>

  <div id="err" class="error" hidden></div>

  <section id="listSection" class="panel" hidden>
    <h2>Результаты</h2>
    <table class="table" id="resultsTable">
      <thead>
        <tr>
          <th>Correlation ID</th>
          <th>Чат / сообщение</th>
          <th>Событий</th>
          <th>Обновлён</th>
          <th>Сводка</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section id="detailSection" class="panel" hidden>
    <div class="detail-head">
      <h2>Таймлайн</h2>
      <button type="button" id="btnBack" class="linkish">← К списку</button>
    </div>
    <p id="detailSummary" class="summary"></p>
    <p id="detailMeta" class="muted"></p>
    <div class="timeline" id="timeline"></div>
    <details class="raw">
      <summary>Сырой JSON</summary>
      <pre id="rawJson"></pre>
    </details>
  </section>

  <script src="/ui/app.js"></script>
</body>
</html>
