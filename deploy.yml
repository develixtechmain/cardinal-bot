services:

  app:
    image: registry.develixtech.com/cardinal/app:0.0.1-SNAPSHOT
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_BASE_URL: https://127.0.0.1:8443/api
      VITE_AI_CORE_BASE_URL: https://127.0.0.1:8001/api

  telegram-parser:
    image: registry.develixtech.com/cardinal/telegram-parser:0.0.1-SNAPSHOT
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      PYRO_SESSION: cardinal_1
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - pyrogram-sessions:/app/pyrogram-sessions
    depends_on:
      - rabbitmq
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M

  message-processor:
    image: registry.develixtech.com/cardinal/message-processor:0.0.1-SNAPSHOT
    restart: unless-stopped
    environment:
      EMBEDDINGS_PROCESSOR_HOST: http://embeddings-processor:8080
      DB_HOST: ${POSTGRESQL_HOST}
      DB_NAME: ${POSTGRESQL_DB}
      DB_USER: ${POSTGRESQL_USER}
      DB_PASS: ${POSTGRESQL_PASS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PASS: ${CLICKHOUSE_PASS}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      EMBEDDINGS_PROCESSOR_KEY: ${EMBEDDINGS_PROCESSOR_KEY}
    depends_on:
      - postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  embeddings-processor:
    image: registry.develixtech.com/cardinal/embeddings-processor:0.0.1-SNAPSHOT
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Qdrant__CollectionName: leads
      Qdrant__Host: http://qdrant:6333
      EmbeddingsApi__Host: http://embeddings:80
      Qdrant__ApiKey: ${QDRANT_KEY}
      ApiKey: ${EMBEDDINGS_PROCESSOR_KEY}
      ConnectionStrings__Postgres: ${EMBEDDINGS_PROCESSOR_DB_CONNECTION_STRING}
    depends_on:
      - qdrant
      - embeddings
      - embeddings-postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "18080:8080"

  backend-core:
    image: registry.develixtech.com/cardinal/backend-core:0.0.1-SNAPSHOT
    restart: unless-stopped
    environment:
      WEBHOOK_URL: https://6d0e6a411eaa.ngrok-free.app
      AI_CORE_HOST: http://ai-core:8000
      EMBEDDINGS_PROCESSOR_HOST: http://embeddings-processor:8080
      BOT_TOKEN: ${BOT_TOKEN}
      RECOMMENDATION_BOT_TOKEN: ${RECOMMENDATION_BOT_TOKEN}
      WEBHOOK_KEY: ${TG_WEBHOOK_KEY}
      DB_HOST: ${POSTGRESQL_HOST}
      DB_NAME: ${POSTGRESQL_DB}
      DB_USER: ${POSTGRESQL_USER}
      DB_PASS: ${POSTGRESQL_PASS}
      LAVA_KEY: ${LAVA_KEY}
      LAVA_X_KEY: ${LAVA_WEBHOOK_KEY}
      SECURITY_KEY: ${SECURITY_KEY}
      AI_CORE_KEY: ${AI_CORE_KEY}
      API_KEY: ${BACKEND_CORE_KEY}
      EMBEDDINGS_PROCESSOR_KEY: ${EMBEDDINGS_PROCESSOR_KEY}
    depends_on:
      - postgresql
      - ai-core
      - embeddings-processor
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  ai-core:
    image: registry.develixtech.com/cardinal/ai-core:0.0.1-SNAPSHOT
    restart: unless-stopped
    environment:
      AI_MODE: prod
      LANGSMITH_TRACING: true
      LANGSMITH_PROJECT: cardinal
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      API_KEY: ${AI_CORE_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      SECURITY_KEY: ${SECURITY_KEY}
      DB_HOST: ${POSTGRESQL_HOST}
      DB_NAME: ${POSTGRESQL_DB}
      DB_USER: ${POSTGRESQL_USER}
      DB_PASS: ${POSTGRESQL_PASS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
    depends_on:
      - rabbitmq
      - clickhouse
      - embeddings-processor
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "8080:8000"

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_KEY}
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "10633:6333"

  rabbitmq:
    image: rabbitmq:3
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_DEFAULT_USER: cardinal
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    restart: unless-stopped
    environment:
      - MODEL_ID=intfloat/multilingual-e5-base
      - NUM_WORKERS=2
      - POOLING=mean
    volumes:
      - embeddings-data:/data
    deploy:
      resources:
        limits:
          memory: 3GB
        reservations:
          memory: 1GB

  clickhouse:
    image: clickhouse/clickhouse-server:25.6-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: cardinal
      CLICKHOUSE_USER: cardinal
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASS}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgresql:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardinal
      POSTGRES_USER: cardinal
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  embeddings-postgresql:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: cardinal
      POSTGRES_USER: cardinal
      POSTGRES_PASSWORD: ${EMBEDDINGS_PROCESSOR_POSTGRESQL_PASS}
    volumes:
      - embeddings-postgresql-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  qdrant-data:
  rabbitmq-data:
  embeddings-data:
  clickhouse-data:
  postgresql-data:
  embeddings-postgresql-data:
  pyrogram-sessions:
    external: true