# Full stack aligned with deploy.yml. Copy env.example to .env and fill secrets.
# Create external volume before first run: docker volume create pyrogram-sessions

name: cardinal

services:
  app:
    image: registry.develixtech.com/admin/cardinal-app:0.0.4
    restart: unless-stopped
    ports:
      - "3000:3000"

  trace-postgresql:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TRACE_DB_NAME:-trace}
      POSTGRES_USER: ${TRACE_DB_USER:-trace}
      POSTGRES_PASSWORD: ${TRACE_DB_PASS}
    volumes:
      - cardinal-trace-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  trace-service:
    build:
      context: ./trace_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TRACE_DB_HOST: trace-postgresql
      TRACE_DB_NAME: ${TRACE_DB_NAME:-trace}
      TRACE_DB_USER: ${TRACE_DB_USER:-trace}
      TRACE_DB_PASS: ${TRACE_DB_PASS}
      TRACE_DB_PORT: ${TRACE_DB_PORT:-5432}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      TRACE_BATCH_SIZE: ${TRACE_BATCH_SIZE:-50}
      TRACE_BATCH_TIMEOUT: ${TRACE_BATCH_TIMEOUT:-2.0}
    depends_on:
      - trace-postgresql
      - rabbitmq

  admin-ui:
    build:
      context: ./admin_ui
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_EXPIRY_HOURS: ${ADMIN_JWT_EXPIRY_HOURS:-24}
      TRACE_DB_HOST: trace-postgresql
      TRACE_DB_NAME: ${TRACE_DB_NAME:-trace}
      TRACE_DB_USER: ${TRACE_DB_USER:-trace}
      TRACE_DB_PASS: ${TRACE_DB_PASS}
      TRACE_DB_PORT: ${TRACE_DB_PORT:-5432}
      MAIN_DB_HOST: postgresql
      MAIN_DB_NAME: ${POSTGRESQL_DB:-cardinal}
      MAIN_DB_USER: ${POSTGRESQL_USER:-cardinal}
      MAIN_DB_PASS: ${POSTGRESQL_PASS}
      MAIN_DB_PORT: ${POSTGRESQL_PORT:-5432}
      BOT_TOKEN: ${BOT_TOKEN}
      PORT: "8011"
    ports:
      - "8011:8011"
    depends_on:
      - trace-postgresql
      - postgresql

  telegram-parser:
    image: registry.develixtech.com/admin/cardinal-tg-parser:0.0.4
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      PYRO_SESSIONS: ${PYRO_SESSIONS:-cardinal_1,cardinal_3}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHECK_DUPLICATES: ${CHECK_DUPLICATES:-false}
      ENABLE_PULL: ${ENABLE_PULL:-true}
    volumes:
      - pyrogram-sessions:/app/pyrogram-sessions
    depends_on:
      - rabbitmq
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M

  telegram-parser-2:
    image: registry.develixtech.com/admin/cardinal-tg-parser:0.0.4
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      PYRO_SESSIONS: ${PYRO_SESSIONS:-cardinal_2}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHECK_DUPLICATES: ${CHECK_DUPLICATES:-false}
      ENABLE_PULL: ${ENABLE_PULL:-true}
    volumes:
      - pyrogram-sessions:/app/pyrogram-sessions
    depends_on:
      - rabbitmq
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M

  message-processor:
    image: registry.develixtech.com/admin/cardinal-message-processor:0.0.4
    restart: unless-stopped
    environment:
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-cardinal}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      BACKEND_CORE_HOST: ${BACKEND_CORE_HOST:-http://backend-core:8000}
      EMBEDDINGS_PROCESSOR_HOST: http://embeddings-processor:8080
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DB_HOST: postgresql
      DB_NAME: ${POSTGRESQL_DB:-cardinal}
      DB_USER: ${POSTGRESQL_USER:-cardinal}
      DB_PASS: ${POSTGRESQL_PASS}
      DB_PORT: ${POSTGRESQL_PORT:-5432}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.5}
      BACKEND_CORE_KEY: ${BACKEND_CORE_KEY}
      EMBEDDINGS_PROCESSOR_KEY: ${EMBEDDINGS_PROCESSOR_KEY}
      QUEUE_TASKS: ${QUEUE_TASKS:-50}
      AI_VERSION: ${AI_VERSION:-gpt-4.1-mini}
    depends_on:
      - redis
      - rabbitmq
      - postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  embeddings-processor:
    image: registry.develixtech.com/admin/cardinal-embeding-processor:0.0.4
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${EMBEDDINGS_ASPNETCORE_ENVIRONMENT:-Production}
      Qdrant__CollectionName: ${QDRANT_COLLECTION_NAME:-leads}
      Qdrant__Host: ${QDRANT_APP_HOST:-http://qdrant:6333}
      EmbeddingsApi__Host: http://embeddings:80
      Qdrant__ApiKey: ${QDRANT_KEY}
      ApiKey: ${EMBEDDINGS_PROCESSOR_KEY}
      ConnectionStrings__Postgres: ${EMBEDDINGS_PROCESSOR_DB_CONNECTION_STRING}
      Search__ScoreThreshold: ${EMBEDDINGS_SEARCH_SCORE_THRESHOLD:-0.86}
      Search__TopN: ${SEARCH_TOPN:-1000}
      Search__BayesianAlpha: ${SEARCH_BAYESIAN_ALPHA:-1.0}
      Search__BayesianBeta: ${SEARCH_BAYESIAN_BETA:-1.0}
      Search__MinGroupScoreSumThreshold: ${SEARCH_MIN_GROUP_SCORE_SUM_THRESHOLD:-0.6}
      Search__PoolingMode: ${SEARCH_POOLING_MODE:-max}
    depends_on:
      - qdrant
      - embeddings
      - embeddings-postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend-core:
    image: registry.develixtech.com/admin/cardinal-bot-backend:0.0.4
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      WEBHOOK_URL: ${WEBHOOK_URL}
      AI_CORE_HOST: http://ai-core:8000
      EMBEDDINGS_PROCESSOR_HOST: http://embeddings-processor:8080
      BOT_TOKEN: ${BOT_TOKEN}
      RECOMMENDATION_BOT_TOKEN: ${RECOMMENDATION_BOT_TOKEN}
      WEBHOOK_KEY: ${TG_WEBHOOK_KEY}
      DB_HOST: postgresql
      DB_NAME: ${POSTGRESQL_DB:-cardinal}
      DB_USER: ${POSTGRESQL_USER:-cardinal}
      DB_PASS: ${POSTGRESQL_PASS}
      DB_PORT: ${POSTGRESQL_PORT:-5432}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ALPHA_KEY: ${ALPHA_KEY}
      LAVA_KEY: ${LAVA_KEY}
      LAVA_X_KEY: ${LAVA_WEBHOOK_KEY}
      ROBOKASSA_PASS_1: ${ROBOKASSA_PASS_1}
      ROBOKASSA_PASS_2: ${ROBOKASSA_PASS_2}
      ROBOKASSA_TEST: ${ROBOKASSA_TEST:-false}
      SECURITY_KEY: ${SECURITY_KEY}
      AI_CORE_KEY: ${AI_CORE_KEY}
      API_KEY: ${BACKEND_CORE_KEY}
      EMBEDDINGS_PROCESSOR_KEY: ${EMBEDDINGS_PROCESSOR_KEY}
      SELARTI_AUTH_HOST: ${SELARTI_AUTH_HOST}
      SELARTI_TARGET_HOST: ${SELARTI_TARGET_HOST}
      SELARTI_KEY: ${SELARTI_KEY}
      SELARTI_TASK: ${SELARTI_TASK}
    depends_on:
      - postgresql
      - redis
      - ai-core
      - embeddings-processor
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  ai-core:
    image: registry.develixtech.com/admin/cardinal-ai-core:0.0.4
    restart: unless-stopped
    environment:
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      AI_MODE: ${AI_MODE:-prod}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-cardinal}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      API_KEY: ${AI_CORE_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      SECURITY_KEY: ${SECURITY_KEY}
      DB_HOST: postgresql
      DB_NAME: ${POSTGRESQL_DB:-cardinal}
      DB_USER: ${POSTGRESQL_USER:-cardinal}
      DB_PASS: ${POSTGRESQL_PASS}
      DB_PORT: ${POSTGRESQL_PORT:-5432}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      AI_VERSION: ${AI_VERSION:-gpt-4.1-mini}
    depends_on:
      - postgresql
    ports:
      - "8088:8000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_KEY}
    volumes:
      - cardinal-qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cardinal}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - cardinal-rabbitmq:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:8.4.0-alpine3.22
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # $$ so Compose leaves $REDIS_PASSWORD for the container shell (env from environment: below)
    command: >
      sh -c "redis-server
      --save 60 3000
      --loglevel warning
      --requirepass $$REDIS_PASSWORD"
    ports:
      - "6379:6379"
    volumes:
      - cardinal-redis:/data

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    restart: unless-stopped
    environment:
      MODEL_ID: intfloat/multilingual-e5-base
      NUM_WORKERS: 2
      POOLING: mean
      MAX_CLIENT_BATCH_SIZE: 1000
    volumes:
      - embeddings-data:/data
    deploy:
      resources:
        limits:
          memory: 6GB
        reservations:
          memory: 4GB

  postgresql:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRESQL_DB:-cardinal}
      POSTGRES_USER: ${POSTGRESQL_USER:-cardinal}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
    volumes:
      - cardinal-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  embeddings-postgresql:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EMBEDDINGS_POSTGRESQL_DB:-cardinal}
      POSTGRES_USER: ${EMBEDDINGS_POSTGRESQL_USER:-cardinal}
      POSTGRES_PASSWORD: ${EMBEDDINGS_PROCESSOR_POSTGRESQL_PASS}
    volumes:
      - cardinal-embeddings-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  cardinal-redis:
    external: true
  cardinal-qdrant:
    external: true
  cardinal-rabbitmq:
    external: true
  cardinal-postgres:
    external: true
  cardinal-embeddings-postgres:
    external: true
  cardinal-trace-postgres:
    external: true
  pyrogram-sessions:
    external: true
  embeddings-data: